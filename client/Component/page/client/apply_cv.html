<!DOCTYPE html>
<html lang="en" theme-mode="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Application | Job Board</title>
    <link rel="stylesheet" href="../../../Assets/css/style.css">
</head>
<body>

    <!-- Header/Navigation Content -->
    <header class="header"></header>

    <!-- Main Content -->
    <main class="main-content px-3">
        
        <div class="row my-4">
            <div class="col-12 text-center" style="background-color: var(--dark-200); padding: 40px; border-radius: 12px;">
                <h1 class="glow-text">Apply Application Now</h1>
                <p class="text-muted" style="color: var(--dark-700);">Take the next big step in your engineering career path today.</p>
            </div>
        </div>

        <div class="row">
            
            <div class="col-4">
                <div class="card mb-3" id="apply_detail">
                   <!-- UI for job requirement  -->
                </div>

                <div class="card">
                    <div class="card_body">
                        <h3 class="text-heading" style="font-size: 1rem; margin-bottom: 0.75rem;">Requirements</h3>
                        <ul class="list-unstyled text-muted lh-lg">
                            <li>✓ Validated workspace portfolio</li>
                            <li>✓ Updated CV file (PDF preferred)</li>
                            <li>✓ Cover letter introduction</li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="col-8">
                <div class="card">
                    <div class="card_body">
                        <h2 class="text-heading" style="font-size: 1.5rem; margin-bottom: 1.5rem;">Application Form</h2>
                        
                        <form action="#" enctype="multipart/form-data">
                            <div class="row">
                                <div class="col-12">
                                    <label class="form-label" style="color: var(--text-main);">Upload CV / Resume *</label>
                                    
                                    <label for="cvFile" class="card flex-center text-center py-4 px-3" style="border: 2px dashed var(--border-color); cursor: pointer; min-height: 200px; background-color: color-mix(in srgb, var(--bg-main) 40%, transparent);">
                                        
                                        <div class="my-2" id="cvContainer">
                                            <span style="font-size: 2.5rem; display: block; margin-bottom: 0.5rem;">📄</span>
                                            <p class="text-heading" style="font-size: 1.1rem; margin-bottom: 4px;">Click to upload or drag and drop</p>
                                            <p class="text-muted" style="font-size: 0.85rem;">PDF, DOCX, or DOC up to 10MB</p>
                                        </div>

                                        <div class="my-2" id="cvImageWrapper" style="display: none; width: 100%; text-align: center;">
                                            <img id="previewImg" src="" alt="CV Preview" style="max-height: 180px; border-radius: 8px; box-shadow: var(--shadow-sm); margin-bottom: 10px; display: none;">
                                            <div id="previewDocIcon" style="font-size: 4rem; margin-bottom: 10px; display: none;">📂</div>
                                        </div>

                                        <input type="file" id="cvFile" accept=".pdf,.doc,.docx" required style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0;">
                                        
                                        <p id="fileNameDisplay" class="badge badge--remote mt-1" style="display: none; text-transform: none; font-size: 0.85rem; letter-spacing: normal;"></p>
                                    </label>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-12">
                                    <label class="form-label" for="txtCoverLetter" style="color: var(--text-main);">Cover Letter / Personal Note</label>
                                    <textarea id="txtCoverLetter" class="form-control" rows="6" placeholder="Tell us briefly why you want to build alongside our core product team..."></textarea>
                                </div>
                            </div>

                            <div class="row mt-1">
                                <div class="col-12 text-end">
                                    <button type="button" class="btn text-muted-link mx-2" id="btn_cancel" style="background: transparent; border: none; cursor: pointer;">Cancel</button>
                                    <button type="submit" class="btn-primary" id="btn_apply">Submit CV Application</button>
                                </div>
                            </div>

                        </form>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer Contaent -->
    <footer class="footer-content"></footer>

    <!-- Load Header/Navigation and Footer -->
    <script src="../../layout/client_layout.js"></script>
    <script src="../../../Assets/js/mode.js"></script>

    <script src="../../../Assets/js/apply_cv.js"></script>
</body>
</html>
